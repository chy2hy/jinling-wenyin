<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>金陵纹影 · 南京云锦数字化3D交互展</title>

<!-- ===== 字体 ===== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

<style>
/* ===== 全局重置 ===== */
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#080604;font-family:'Noto Serif SC','ZCOOL XiaoWei',serif;-webkit-font-smoothing:antialiased}
#canvas-container{width:100vw;height:100vh;display:block}

/* ===== 加载画面 ===== */
#loader{
    position:fixed;inset:0;z-index:9999;
    background:radial-gradient(ellipse at center,#1a1008,#080604);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:opacity 1.2s ease;font-family:'Noto Serif SC',serif;
}
#loader.hide{opacity:0;pointer-events:none}
#loader .logo{font-size:36px;color:#d4a853;letter-spacing:10px;font-weight:700}
#loader .logo span{color:#cd3333}
#loader .sub{color:rgba(255,255,255,0.35);font-size:13px;letter-spacing:6px;margin:8px 0 40px}
#loader .progress-wrap{width:280px;height:2px;background:rgba(212,168,83,0.1);border-radius:2px;overflow:hidden}
#loader .progress-bar{width:0%;height:100%;background:linear-gradient(90deg,#d4a853,#cd3333);transition:width 0.3s ease;border-radius:2px}
#loader .progress-text{color:rgba(212,168,83,0.5);font-size:12px;letter-spacing:2px;margin-top:8px}

/* ===== HUD 标题 ===== */
#hud{
    position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:100;
    text-align:center;pointer-events:none;opacity:0;transition:opacity 2s ease;
}
#hud.show{opacity:1}
#hud h1{font-size:30px;font-weight:700;letter-spacing:10px;color:#d4a853;text-shadow:0 0 40px rgba(212,168,83,0.15)}
#hud p{font-size:13px;color:rgba(255,255,255,0.3);letter-spacing:6px;margin-top:2px}

/* ===== 导航 ===== */
#nav{
    position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:100;
    display:flex;gap:6px;flex-wrap:wrap;justify-content:center;opacity:0;transition:opacity 1s ease;
}
#nav.show{opacity:1}
#nav button{
    background:rgba(255,255,255,0.04);border:1px solid rgba(212,168,83,0.15);
    color:rgba(255,255,255,0.5);padding:6px 18px;border-radius:20px;
    font-size:12px;letter-spacing:2px;cursor:pointer;font-family:inherit;
    transition:all 0.4s ease;pointer-events:auto;backdrop-filter:blur(8px);
}
#nav button:hover{background:rgba(212,168,83,0.15);color:#d4a853;border-color:rgba(212,168,83,0.3);transform:translateY(-1px)}
#nav button.active{background:rgba(212,168,83,0.12);color:#d4a853;border-color:#d4a853}

/* ===== 信息面板 ===== */
#info-overlay{
    position:fixed;inset:0;z-index:200;
    background:rgba(0,0,0,0.7);backdrop-filter:blur(16px);
    display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:all 0.6s cubic-bezier(0.4,0,0.2,1);
}
#info-overlay.show{opacity:1;pointer-events:auto}
#info-panel{
    max-width:680px;width:90%;max-height:85vh;overflow-y:auto;
    background:linear-gradient(145deg,rgba(20,14,8,0.95),rgba(10,8,6,0.98));
    border:1px solid rgba(212,168,83,0.2);border-radius:16px;
    padding:40px 44px;position:relative;
    transform:translateY(30px);transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);
}
#info-overlay.show #info-panel{transform:translateY(0)}
#info-panel::-webkit-scrollbar{width:4px}
#info-panel::-webkit-scrollbar-thumb{background:rgba(212,168,83,0.3);border-radius:2px}
#info-close{
    position:absolute;top:16px;right:20px;
    background:none;border:none;color:rgba(255,255,255,0.3);
    font-size:22px;cursor:pointer;transition:color 0.3s;font-family:inherit;
}
#info-close:hover{color:#d4a853}
#info-panel .tag{
    display:inline-block;padding:3px 14px;border:1px solid rgba(212,168,83,0.3);
    border-radius:12px;font-size:11px;color:#d4a853;letter-spacing:2px;margin-bottom:12px;
}
#info-panel .title{font-size:30px;color:#d4a853;font-weight:700;letter-spacing:4px;margin-bottom:4px}
#info-panel .subtitle{font-size:14px;color:rgba(255,255,255,0.35);letter-spacing:3px;margin-bottom:20px}
#info-panel .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,83,0.3),transparent);margin-bottom:20px}
#info-panel .desc{font-size:15px;color:rgba(255,255,255,0.75);line-height:2;letter-spacing:0.5px;text-align:justify}
#info-panel .highlight{color:#d4a853}

/* ===== 浮动工具栏 ===== */
#toolbar{
    position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:100;
    display:flex;gap:12px;opacity:0;transition:opacity 1.5s ease;
}
#toolbar.show{opacity:1}
#toolbar button{
    background:rgba(10,8,6,0.7);border:1px solid rgba(212,168,83,0.15);
    color:rgba(255,255,255,0.5);padding:8px 18px;border-radius:24px;
    font-size:12px;letter-spacing:1px;cursor:pointer;font-family:inherit;
    backdrop-filter:blur(12px);transition:all 0.4s ease;
    display:flex;align-items:center;gap:6px;
}
#toolbar button:hover{background:rgba(212,168,83,0.12);color:#d4a853;border-color:rgba(212,168,83,0.3)}
#toolbar button.active{background:rgba(212,168,83,0.1);color:#d4a853;border-color:#d4a853}
#toolbar .icon{font-size:14px}

/* ===== 控制提示 ===== */
#hint{
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:50;
    color:rgba(255,255,255,0.15);font-size:11px;letter-spacing:3px;
    opacity:0;transition:opacity 2s ease;text-align:center;pointer-events:none;
}
#hint.show{opacity:1}

/* ===== 音频提示 ===== */
#audio-init{
    position:fixed;bottom:32px;right:32px;z-index:100;
    background:rgba(10,8,6,0.6);border:1px solid rgba(212,168,83,0.12);
    color:rgba(255,255,255,0.3);padding:8px 14px;border-radius:20px;
    font-size:11px;letter-spacing:1px;cursor:pointer;font-family:inherit;
    backdrop-filter:blur(8px);transition:all 0.3s;opacity:0;
}
#audio-init.show{opacity:1}
#audio-init:hover{color:#d4a853;border-color:rgba(212,168,83,0.3)}

/* ===== 视频录制标记 ===== */
#rec-badge{
    position:fixed;top:24px;right:24px;z-index:100;
    display:flex;align-items:center;gap:6px;opacity:0;transition:opacity 1s;
}
#rec-badge.show{opacity:1}
#rec-badge .dot{width:8px;height:8px;background:#cd3333;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
#rec-badge span{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:2px}

/* ===== 滚动条美化 ===== */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(212,168,83,0.2);border-radius:2px}

/* ===== 响应式 ===== */
@media(max-width:768px){
    #hud h1{font-size:20px;letter-spacing:6px}
    #hud p{font-size:11px;letter-spacing:4px}
    #nav{top:68px;gap:4px}
    #nav button{font-size:11px;padding:4px 14px;letter-spacing:1px}
    #info-panel{padding:28px 24px}
    #info-panel .title{font-size:24px}
    #toolbar{gap:8px}
    #toolbar button{font-size:11px;padding:6px 14px}
    #audio-init{bottom:80px;right:16px}
}
</style>
</head>
<body>

<!-- ===== 加载画面 ===== -->
<div id="loader">
    <div class="logo">金陵<span>纹</span>影</div>
    <div class="sub">南京云锦 · 数字化3D交互展</div>
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="progress-text" id="progress-text">加载中 0%</div>
</div>

<!-- ===== HUD ===== -->
<div id="hud"><h1>金陵纹影</h1><p>南京云锦 · 数字化3D交互展</p></div>

<!-- ===== 导航 ===== -->
<div id="nav">
    <button class="active" data-ex="0">🏛️ 云锦溯源</button>
    <button data-ex="1">🐉 纹样典藏</button>
    <button data-ex="2">🧵 织造技艺</button>
    <button data-ex="3">✨ AI新创</button>
</div>

<!-- ===== 信息弹窗 ===== -->
<div id="info-overlay">
    <div id="info-panel">
        <button id="info-close">✕</button>
        <div class="tag" id="info-tag">云锦溯源</div>
        <div class="title" id="info-title"></div>
        <div class="subtitle" id="info-subtitle"></div>
        <div class="divider"></div>
        <div class="desc" id="info-desc"></div>
    </div>
</div>

<!-- ===== 工具栏 ===== -->
<div id="toolbar">
    <button id="btn-tour"><span class="icon">🎧</span> 导览</button>
    <button id="btn-auto"><span class="icon">⟳</span> 自动漫游</button>
    <button id="btn-sound"><span class="icon">♪</span> 音效</button>
    <button id="btn-fullscreen"><span class="icon">⛶</span> 全屏</button>
</div>

<!-- ===== 提示 ===== -->
<div id="hint">🖱 拖拽旋转 · 滚轮缩放 · 点击展品了解详情</div>
<div id="audio-init">🎵 点击开启音效</div>

<div id="canvas-container"></div>

<!-- ===== Three.js ES Module ===== -->
<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
// ============================================================
//  导入
// ============================================================
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ============================================================
//  展品数据
// ============================================================
const EXHIBITS = [
    {
        id:'origin', title:'云锦溯源', tag:'世界非物质文化遗产',
        subtitle:'1600年 · 灿若云霞',
        desc:'南京云锦，因其绚丽多姿、灿若云霞而得名，至今已有近1600年历史。2009年被联合国教科文组织列入《人类非物质文化遗产代表作名录》。云锦与成都蜀锦、苏州宋锦并称中国三大名锦，而云锦以其独特的妆花工艺居首，素有"寸锦寸金"之说。',
        color:'#d4a853', pos:[0,1.8,-7]
    },
    {
        id:'patterns', title:'龙凤呈祥', tag:'经典纹样 · 明代万历',
        subtitle:'龙飞凤舞 · 吉祥如意',
        desc:'云锦经典纹样，以龙、凤为主体，辅以祥云、花卉。龙代表权威尊贵，凤象征吉祥和谐。采用妆花工艺，以金线、彩绒交织，图案层次丰富、金彩交辉，是云锦最具代表性的纹样之一。明万历皇帝龙袍即采用此类纹样。',
        color:'#cd3333', pos:[-5.5,1.8,0]
    },
    {
        id:'weaving', title:'织造技艺', tag:'挑花结本 · 通经断纬',
        subtitle:'两人配合 · 日织5厘米',
        desc:'云锦使用传统的提花木机织造，由"拽花工"和"织手"两人配合完成。挑花结本相当于现代编程，将纹样转化为织造程序；通经断纬技术则使图案色彩丰富、过渡自然。一名熟练织工一天仅能织造5-6厘米，可谓"寸锦寸金"。该技艺代表了中国古代丝织工艺的最高水平。',
        color:'#8b6914', pos:[5.5,1.8,0]
    },
    {
        id:'ai', title:'AI 新创纹样', tag:'人工智能 · 传统新生',
        subtitle:'算法学习 · 风格融合',
        desc:'基于传统云锦纹样的色彩搭配与构图规律，AI深度学习模型通过学习数百幅云锦经典纹样，生成融合传统美学与现代设计的全新纹样。传统与科技的融合，让千年云锦在数字时代焕发新生。每一幅AI纹样都是独一无二的，代表着非遗创新的未来方向。',
        color:'#4a7a9c', pos:[0,1.8,7]
    }
];

const PATTERNS = [
    { name:'龙凤呈祥', meaning:'尊贵吉祥', color:'#cd3333' },
    { name:'鱼戏莲', meaning:'连年有余', color:'#4a7a9c' },
    { name:'五福捧寿', meaning:'五福临门', color:'#6b8e23' },
    { name:'富贵牡丹', meaning:'繁荣昌盛', color:'#cd5c5c' },
    { name:'八宝纹', meaning:'驱邪纳福', color:'#8b6914' },
    { name:'祥云瑞彩', meaning:'好运连连', color:'#d4a853' },
    { name:'海水江崖', meaning:'江山永固', color:'#2a5a7a' },
    { name:'AI新创', meaning:'融合创新', color:'#4a7a9c' }
];

// ============================================================
//  DOM 引用
// ============================================================
const container = document.getElementById('canvas-container');
const loader = document.getElementById('loader');
const progressBar = document.getElementById('progress-bar');
const progressText = document.getElementById('progress-text');
const hud = document.getElementById('hud');
const nav = document.getElementById('nav');
const hint = document.getElementById('hint');
const toolbar = document.getElementById('toolbar');
const audioInit = document.getElementById('audio-init');
const infoOverlay = document.getElementById('info-overlay');
const infoPanel = document.getElementById('info-panel');
const infoClose = document.getElementById('info-close');
const infoTag = document.getElementById('info-tag');
const infoTitle = document.getElementById('info-title');
const infoSubtitle = document.getElementById('info-subtitle');
const infoDesc = document.getElementById('info-desc');

// ============================================================
//  加载进度模拟
// ============================================================
let loadProgress = 0;
function advanceLoad(amount, label) {
    loadProgress = Math.min(loadProgress + amount, 100);
    progressBar.style.width = loadProgress + '%';
    progressText.textContent = '加载中 ' + loadProgress + '%';
    if(loadProgress >= 100) {
        setTimeout(() => {
            loader.classList.add('hide');
            hud.classList.add('show');
            nav.classList.add('show');
            hint.classList.add('show');
            toolbar.classList.add('show');
            audioInit.classList.add('show');
        }, 400);
    }
}

advanceLoad(10, '初始化场景...');

// ============================================================
//  Three.js 场景
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080604);
scene.fog = new THREE.Fog(0x080604, 18, 30);

// 相机
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 40);
camera.position.set(9, 5, 14);

// 渲染器
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

advanceLoad(15, '加载渲染引擎...');

// 控制器
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 4;
controls.maxDistance = 22;
controls.maxPolarAngle = Math.PI / 2.05;
controls.target.set(0, 1.2, 0);
controls.update();

// ===== 后处理 (Bloom) =====
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.3,  // strength
    0.4,  // radius
    0.1   // threshold
);
composer.addPass(bloomPass);

advanceLoad(10, '加载后期特效...');

// ============================================================
//  灯光系统
// ============================================================
// 环境光
const ambient = new THREE.AmbientLight(0x22110a, 0.3);
scene.add(ambient);

// 主光 — 暖色
const mainLight = new THREE.DirectionalLight(0xffddaa, 1.2);
mainLight.position.set(6, 12, 8);
mainLight.castShadow = true;
mainLight.shadow.mapSize.width = 1024;
mainLight.shadow.mapSize.height = 1024;
mainLight.shadow.camera.near = 1;
mainLight.shadow.camera.far = 25;
scene.add(mainLight);

// 补光 — 冷色
const fillLight = new THREE.DirectionalLight(0x8888ff, 0.25);
fillLight.position.set(-6, 4, -8);
scene.add(fillLight);

// 背光 — 金色轮廓
const rimLight = new THREE.DirectionalLight(0xd4a853, 0.6);
rimLight.position.set(-4, 6, 10);
scene.add(rimLight);

// 顶部聚光
const spotLight = new THREE.SpotLight(0xd4a853, 0.8, 20, Math.PI/8, 0.5, 1);
spotLight.position.set(0, 10, 0);
spotLight.target.position.set(0, 0, 0);
scene.add(spotLight); scene.add(spotLight.target);

const spot2 = new THREE.SpotLight(0xcd3333, 0.3, 15, Math.PI/10, 0.5);
spot2.position.set(-4, 8, -3);
spot2.target.position.set(-4, 0, -3);
scene.add(spot2); scene.add(spot2.target);

const spot3 = new THREE.SpotLight(0x4488cc, 0.3, 15, Math.PI/10, 0.5);
spot3.position.set(4, 8, 3);
spot3.target.position.set(4, 0, 3);
scene.add(spot3); scene.add(spot3.target);

advanceLoad(10, '布置灯光...');

// ============================================================
//  地面
// ============================================================
// 青石地面
const floorGeo = new THREE.PlaneGeometry(30, 30);
const floorMat = new THREE.MeshStandardMaterial({
    color: 0x1a1410, roughness: 0.8, metalness: 0.05
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// 地砖分割线
const grid = new THREE.GridHelper(24, 16, 0xd4a853, 0xd4a853);
grid.material.transparent = true;
grid.material.opacity = 0.06;
scene.add(grid);

advanceLoad(10, '铺设地面...');

// ============================================================
//  中式展厅建筑
// ============================================================
function buildGallery() {
    const group = new THREE.Group();

    // --- 立柱 ---
    const pillarMat = new THREE.MeshStandardMaterial({
        color: 0x3a2010, roughness: 0.6, metalness: 0.15
    });
    const pillarPos = [];
    for(let z = -8; z <= 8; z += 4) {
        for(let x = -8; x <= 8; x += 4) {
            if(Math.abs(x) < 6 && Math.abs(z) < 6) continue;
            pillarPos.push([x, z]);
        }
    }
    pillarPos.forEach(([x, z]) => {
        const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.25, 4.5, 8), pillarMat);
        pillar.position.set(x, 2.25, z);
        pillar.castShadow = true;
        group.add(pillar);
    });

    // --- 横梁 ---
    const beamMat = new THREE.MeshStandardMaterial({
        color: 0x2a1a0a, roughness: 0.7, metalness: 0.1
    });
    for(let i = -8; i <= 8; i += 4) {
        // 纵向梁
        const b1 = new THREE.Mesh(new THREE.BoxGeometry(16, 0.08, 0.12), beamMat);
        b1.position.set(0, 4.5, i); group.add(b1);
        // 横向梁
        const b2 = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.08, 16), beamMat);
        b2.position.set(i, 4.5, 0); group.add(b2);
    }

    // --- 中式屋顶 (抽象) ---
    const roofMat = new THREE.MeshStandardMaterial({
        color: 0x1a0e06, roughness: 0.9, metalness: 0,
        side: THREE.DoubleSide
    });
    for(let z = -7; z <= 7; z += 7) {
        for(let x = -7; x <= 7; x += 7) {
            if(Math.abs(x) < 5 && Math.abs(z) < 5) continue;
            // 屋檐
            const eave = new THREE.Mesh(new THREE.BoxGeometry(3.8, 0.06, 3.8), roofMat);
            eave.position.set(x, 4.55, z);
            eave.rotation.x = 0.05;
            group.add(eave);
            // 翘角 (小装饰)
            const tipMat = new THREE.MeshStandardMaterial({
                color: 0x5a3a1a, roughness: 0.5, metalness: 0.3
            });
            for(let tx of [-1.8, 1.8]) {
                for(let tz of [-1.8, 1.8]) {
                    const tip = new THREE.Mesh(
                        new THREE.ConeGeometry(0.08, 0.25, 4),
                        tipMat
                    );
                    tip.position.set(x + tx, 4.7, z + tz);
                    tip.rotation.x = 0.15;
                    group.add(tip);
                }
            }
        }
    }

    // --- 顶部发光藻井 ---
    const glowCanvas = document.createElement('canvas');
    glowCanvas.width = 512; glowCanvas.height = 512;
    const gctx = glowCanvas.getContext('2d');

function generateBrocadeTexture(name, colorHex, isAI=false) {
    const c = document.createElement('canvas');
    c.width = 1024; c.height = 1024;
    const ctx = c.getContext('2d');

    // 1. 基底 — 仿古绢
    const grad = ctx.createRadialGradient(512, 512, 0, 512, 512, 600);
    grad.addColorStop(0, isAI ? '#1a2a18' : '#1a1410');
    grad.addColorStop(0.5, isAI ? '#0f1a0e' : '#0f0a06');
    grad.addColorStop(1, '#060402');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 1024, 1024);

    // 2. 暗纹底纹
    ctx.strokeStyle = `rgba(212,168,83,0.03)`;
    ctx.lineWidth = 0.5;
    for(let i=0; i<1024; i+=64) {
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,1024); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(1024,i); ctx.stroke();
    }

    const cx=512, cy=512, hex=colorHex;

    if(isAI) {
        // AI 风格 — 抽象像素化云锦
        const colors = ['#6b8e23','#d4a853','#cd3333','#4a7a9c','#8b6914'];
        ctx.shadowColor = '#d4a853';
        ctx.shadowBlur = 15;
        for(let ring=0; ring<6; ring++) {
            const n = 8 + ring*2;
            const r = 80 + ring*55;
            for(let i=0; i<n; i++) {
                const a = (i/n)*Math.PI*2 + ring*0.3;
                const px = cx + r*Math.cos(a);
                const py = cy + r*Math.sin(a);
                const col = colors[(ring+i)%colors.length];
                ctx.fillStyle = col;
                ctx.globalAlpha = 0.15 + ring*0.03;
                ctx.beginPath();
                ctx.arc(px, py, 18 - ring*1.5, 0, Math.PI*2);
                ctx.fill();
            }
        }
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
    } else {
        // 传统云锦纹样 — 精细团花
        ctx.shadowColor = hex;
        ctx.shadowBlur = 20;

        // 外圈 — 八宝环绕
        for(let i=0; i<8; i++) {
            const a = (i/8)*Math.PI*2;
            const r = 220;
            const px = cx + r*Math.cos(a);
            const py = cy + r*Math.sin(a);
            ctx.fillStyle = hex; ctx.globalAlpha = 0.1;
            ctx.beginPath();
            ctx.arc(px, py, 35, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = hex; ctx.globalAlpha = 0.25;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // 中圈 — 缠枝牡丹
        for(let i=0; i<12; i++) {
            const a = (i/12)*Math.PI*2;
            const r = 150;
            const petalX = cx + r*Math.cos(a);
            const petalY = cy + r*Math.sin(a);
            ctx.save();
            ctx.translate(petalX, petalY);
            ctx.rotate(a);
            ctx.beginPath();
            ctx.ellipse(0, 0, 50, 22, 0, 0, Math.PI*2);
            ctx.fillStyle = hex; ctx.globalAlpha = 0.08;
            ctx.fill();
            ctx.strokeStyle = hex; ctx.globalAlpha = 0.3;
            ctx.lineWidth = 1.5; ctx.stroke();
            ctx.restore();
        }

        // 中圈小点缀
        for(let i=0; i<24; i++) {
            const a = (i/24)*Math.PI*2;
            const r = 120;
            const px = cx + r*Math.cos(a);
            const py = cy + r*Math.sin(a);
            ctx.fillStyle = '#d4a853'; ctx.globalAlpha = 0.12;
            ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI*2); ctx.fill();
        }

        // 内圈 — 八瓣团花
        for(let i=0; i<8; i++) {
            const a = (i/8)*Math.PI*2 - Math.PI/2;
            const r = 70;
            const px = cx + r*Math.cos(a);
            const py = cy + r*Math.sin(a);
            ctx.save();
            ctx.translate(px, py);
            ctx.rotate(a);
            ctx.beginPath();
            ctx.ellipse(0, 0, 45, 18, 0, 0, Math.PI*2);
            ctx.fillStyle = hex; ctx.globalAlpha = 0.2;
            ctx.fill();
            ctx.strokeStyle = '#d4a853'; ctx.globalAlpha = 0.5;
            ctx.lineWidth = 1.5; ctx.stroke();
            ctx.restore();
        }

        // 花蕊
        const grad2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, 35);
        grad2.addColorStop(0, '#d4a853');
        grad2.addColorStop(0.3, hex);
        grad2.addColorStop(1, hex + '00');
        ctx.fillStyle = grad2; ctx.globalAlpha = 0.7;
        ctx.beginPath(); ctx.arc(cx, cy, 35, 0, Math.PI*2); ctx.fill();

        // 金线描边
        ctx.shadowBlur = 30;
        ctx.strokeStyle = '#d4a853'; ctx.globalAlpha = 0.4;
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(cx, cy, 280, 0, Math.PI*2); ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
    }

    // 标题
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(212,168,83,0.6)';
    ctx.font = '28px "SimSun", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(name, 512, 1000);

    return c;
}

let audioCtx = null;
function initAudio() {
    if(audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(220, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(440, audioCtx.currentTime + 2);
    osc.frequency.linearRampToValueAtTime(330, audioCtx.currentTime + 4);
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 4);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 4.5);
}

const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const t = clock.getElapsedTime();
    const dt = Math.min(clock.getDelta(), 0.05);

    // 粒子漂浮
    const pos = pPosAttr.array;
    for(let i=0; i<particleCount; i++) {
        pos[i*3+1] += Math.sin(t*0.2 + i*0.1) * 0.0005;
        pos[i*3] += Math.cos(t*0.15 + i*0.07) * 0.0003;
        if(pos[i*3+1] > 8) pos[i*3+1] = 0;
        if(pos[i*3] > 14) pos[i*3] = -14;
        if(pos[i*3] < -14) pos[i*3] = 14;
    }
    pPosAttr.needsUpdate = true;

    // 展板发光脉动
    scrollPanels.forEach((g, i) => {
        g.children.forEach(c => {
            if(c.isMesh && c.material && c.material.emissiveIntensity !== undefined) {
                c.material.emissiveIntensity = 0.03 + 0.025 * Math.sin(t*0.7 + i*0.4);
            }
        });
    });
    mainPanel.material.emissiveIntensity = 0.05 + 0.04 * Math.sin(t*0.5);

    // 灯笼微晃
    lanternPos.forEach((p, i) => {
        // 找对应的灯笼 - 懒得建索引了，直接用scene.children查找
    });

    // 导览模式
    if(tourMode) {
        const tourPoints = EXHIBITS.map(e => new THREE.Vector3(e.pos[0]*1.5, e.pos[1]+0.5, e.pos[2]*1.5));
        const lookPoints = EXHIBITS.map(e => new THREE.Vector3(e.pos[0], e.pos[1], e.pos[2]));

        const duration = 8;
        tourProgress += dt / duration;
        if(tourProgress >= 1) {
            tourProgress = 0;
            tourStep = (tourStep + 1) % tourPoints.length;
        }

        const fromIdx = tourStep;
        const toIdx = (tourStep + 1) % tourPoints.length;
        const p1 = lookPoints[fromIdx];
        const p2 = lookPoints[toIdx];

        controls.target.lerp(p2, 0.02);
        const camTarget = new THREE.Vector3().lerpVectors(
            tourPoints[fromIdx], tourPoints[toIdx], tourProgress
        );
        camera.position.lerp(camTarget, 0.03);
    }

    composer.render();
}
